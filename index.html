<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FarmaFormula — Sistema Completo 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07101f;--s1:#0f1c2e;--s2:#162035;--s3:#0a1525;
  --bd:#1e2d42;--bd2:#243350;
  --bl:#3b82f6;--bl2:#60a5fa;--bl3:#1d4ed8;
  --gn:#22c55e;--gn2:#4ade80;--gn3:#15803d;
  --pu:#a855f7;--pu2:#c084fc;--pu3:#7e22ce;
  --or:#f97316;--or2:#fb923c;
  --tl:#14b8a6;--tl2:#2dd4bf;
  --rd:#ef4444;--rd2:#f87171;
  --yw:#eab308;--yw2:#fde047;
  --pk:#ec4899;--pk2:#f9a8d4;
  --tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#94a3b8;--tx4:#475569;--tx5:#334155;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px;}
input,select,textarea,button{font-family:inherit;}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#0c1f3a,#081428);
  border-bottom:2px solid var(--bl3);padding:12px 22px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:300;
}
.hdr-brand h1{font-size:1.05rem;font-weight:700;color:var(--bl2);display:flex;align-items:center;gap:8px;}
.hdr-brand p{font-size:.65rem;color:var(--tx4);margin-top:1px;}
.hdr-stats{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chip{padding:3px 9px;border-radius:20px;font-size:.64rem;font-weight:600;}
.c-bl{background:#1a3356;color:#93c5fd;}
.c-gn{background:#14532d;color:#86efac;}
.c-or{background:#7c2d12;color:#fed7aa;}
.c-pu{background:#3b1f5e;color:#d8b4fe;}
.c-yw{background:#713f12;color:#fde68a;}
.c-rd{background:#7f1d1d;color:#fca5a5;}
.nav{display:flex;gap:4px;flex-wrap:wrap;}
.nb{padding:6px 12px;border:1px solid var(--bd2);background:var(--s3);color:var(--tx3);border-radius:7px;font-size:.72rem;cursor:pointer;transition:.2s;}
.nb:hover,.nb.act{background:var(--bl3);color:#fff;border-color:var(--bl3);}

/* ── LAYOUT ── */
.view{display:none;padding:18px 22px;max-width:1600px;margin:0 auto;}
.view.act{display:block;}

/* ── TABS ── */
.tabs{display:flex;gap:3px;margin-bottom:16px;border-bottom:1px solid var(--bd2);flex-wrap:wrap;}
.tb{padding:7px 13px;border:none;background:transparent;color:var(--tx4);font-size:.74rem;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;}
.tb:hover{color:var(--tx3);}
.tb.act{color:var(--bl2);border-bottom-color:var(--bl);font-weight:600;}
.tc{display:none;}.tc.act{display:block;}

/* ── SECTION TITLE ── */
.st{font-size:.7rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.st::after{content:'';flex:1;height:1px;background:var(--bd2);}

/* ── KPI GRID ── */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:16px;}
.kc{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:.2s;}
.kc:hover{transform:translateY(-2px);}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kc.kb::before{background:var(--bl);}
.kc.kg2::before{background:var(--gn);}
.kc.kp::before{background:var(--pu);}
.kc.ko::before{background:var(--or);}
.kc.kt::before{background:var(--tl);}
.kc.kr::before{background:var(--rd);}
.kc.ky::before{background:var(--yw);}
.kc.kpk::before{background:var(--pk);}
.kc-l{font-size:.6rem;text-transform:uppercase;letter-spacing:.8px;color:var(--tx4);margin-bottom:4px;}
.kc-v{font-size:1.25rem;font-weight:700;color:var(--tx);line-height:1;}
.kc-s{font-size:.64rem;color:var(--tx4);margin-top:3px;}
.ch2{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:.61rem;font-weight:600;margin-top:4px;}
.c2ok{background:#14532d;color:#86efac;}
.c2wa{background:#78350f;color:#fde68a;}
.c2ba{background:#7f1d1d;color:#fca5a5;}
.c2in{background:#1e3a5f;color:#93c5fd;}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:15px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:15px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px;}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.g2,.g3,.g4{grid-template-columns:1fr;}}

/* ── PANEL ── */
.panel{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:15px;margin-bottom:15px;}
.panel-t{font-size:.78rem;font-weight:600;color:var(--tx3);margin-bottom:11px;display:flex;align-items:center;gap:6px;}

/* ── BARRA ── */
.pb{margin-bottom:10px;}
.pb:last-child{margin-bottom:0;}
.pb-h{display:flex;justify-content:space-between;font-size:.69rem;margin-bottom:3px;}
.pb-h strong{color:var(--tx2);}
.bar-bg{height:6px;background:#060d18;border-radius:99px;overflow:hidden;}
.bar-f{height:100%;border-radius:99px;transition:width 1.2s ease;}

/* ── CHART ── */
.chbox{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:15px;margin-bottom:15px;}
.chbox h3{font-size:.76rem;font-weight:600;color:var(--tx3);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.chbox canvas{max-height:220px;}

/* ── TABLE ── */
.tw{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;overflow:hidden;margin-bottom:15px;}
.tb-bar{padding:10px 14px;background:#0b1828;border-bottom:1px solid var(--bd2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.tb-bar strong{font-size:.78rem;font-weight:600;color:var(--bl2);}
.tb-bar span{font-size:.64rem;color:var(--tx4);}
.ts{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.72rem;}
thead th{background:#0a1726;color:var(--bl2);padding:8px 10px;text-align:left;font-size:.61rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--bd2);}
th.r,td.r{text-align:right;}th.c,td.c{text-align:center;}
tbody tr{border-bottom:1px solid #0f1e30;transition:.12s;}
tbody tr:hover{background:#13213a;}
tbody tr.tot{background:#0e1d35;font-weight:700;border-top:2px solid var(--bl3);}
tbody tr.tot td{color:var(--tx);}
td{padding:8px 10px;color:var(--tx2);}
td.n{color:var(--tx);font-weight:500;}
td.v{color:var(--gn2);font-weight:600;}

/* ── ALERT ── */
.alert{padding:9px 12px;border-radius:7px;font-size:.73rem;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px;}
.al-ok{background:#14532d22;border:1px solid #14532d;color:#86efac;}
.al-wa{background:#78350f22;border:1px solid #78350f;color:#fde68a;}
.al-er{background:#7f1d1d22;border:1px solid #7f1d1d;color:#fca5a5;}
.al-in{background:#1e3a5f22;border:1px solid #1e3a5f;color:#93c5fd;}

/* ── VENDOR CARD ── */
.vcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:11px;margin-bottom:15px;}
.vc{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:14px;transition:.2s;}
.vc:hover{transform:translateY(-2px);}
.vc-hd{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;flex-shrink:0;}
.a1{background:#1d4ed8;color:#bfdbfe;}.a2{background:#15803d;color:#bbf7d0;}.a3{background:#7e22ce;color:#e9d5ff;}
.a4{background:#c2410c;color:#fed7aa;}.a5{background:#0f766e;color:#99f6e4;}.a6{background:#9d174d;color:#fbcfe8;}
.a7{background:#374151;color:#d1d5db;}.a8{background:#1e3a5f;color:#93c5fd;}
.vc-nm{font-size:.78rem;font-weight:600;color:var(--tx);}
.vc-sb{font-size:.62rem;color:var(--tx4);}
.vc-st{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.vs{background:var(--s3);border-radius:6px;padding:7px;}
.vs label{display:block;font-size:.58rem;text-transform:uppercase;letter-spacing:.4px;color:var(--tx4);margin-bottom:2px;}
.vs span{font-size:.8rem;font-weight:700;color:var(--tx);}
.vc-tot{margin-top:9px;padding-top:9px;border-top:1px solid var(--bd2);display:flex;justify-content:space-between;align-items:center;}
.vc-tot label{font-size:.63rem;color:var(--tx4);}
.vc-tot span{font-size:.88rem;font-weight:700;color:var(--gn2);}
.vc-meta{margin-top:7px;}
.vc-mh{display:flex;justify-content:space-between;font-size:.62rem;color:var(--tx4);margin-bottom:3px;}
.vc-bon{margin-top:8px;background:#0b1a2e;border-radius:6px;padding:8px;}
.vc-bon-t{font-size:.58rem;text-transform:uppercase;letter-spacing:.4px;color:var(--tx4);font-weight:600;margin-bottom:6px;}
.br{display:flex;justify-content:space-between;font-size:.68rem;margin-bottom:3px;}
.br span{color:var(--tx3);}
.br strong{color:var(--yw2);}

/* ── RANKING ── */
.rl{display:flex;flex-direction:column;gap:7px;}
.ri{background:var(--s1);border:1px solid var(--bd2);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:11px;}
.rp{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;}
.rp1{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;}
.rp2{background:linear-gradient(135deg,#475569,#94a3b8);color:#fff;}
.rp3{background:linear-gradient(135deg,#7c3d1f,#c2702f);color:#fff;}
.rpN{background:var(--s2);color:var(--tx4);border:1px solid var(--bd2);}
.ri-info{flex:1;}
.ri-info strong{display:block;font-size:.78rem;color:var(--tx);}
.ri-info span{font-size:.64rem;color:var(--tx4);}
.ri-v{font-size:.85rem;font-weight:700;color:var(--gn2);}

/* ═══════════════════════
   SIMULADOR
═══════════════════════ */
.sim-layout{display:grid;grid-template-columns:1fr 1.3fr;gap:16px;margin-bottom:16px;}
@media(max-width:900px){.sim-layout{grid-template-columns:1fr;}}

.sim-panel{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;padding:18px;}
.sim-panel h3{font-size:.82rem;font-weight:700;color:var(--bl2);margin-bottom:14px;display:flex;align-items:center;gap:7px;}

.sim-row{margin-bottom:13px;}
.sim-row:last-child{margin-bottom:0;}
.sim-row label{display:block;font-size:.64rem;text-transform:uppercase;letter-spacing:.6px;color:var(--tx4);margin-bottom:5px;font-weight:600;}
.sim-row input[type=range]{width:100%;accent-color:var(--bl);cursor:pointer;height:4px;}
.sim-row select,.sim-row input[type=number],.sim-row input[type=text]{
  width:100%;padding:8px 10px;background:var(--s3);border:1px solid var(--bd2);
  border-radius:8px;color:var(--tx);font-size:.8rem;outline:none;transition:.2s;
}
.sim-row select:focus,.sim-row input:focus{border-color:var(--bl);}
.sim-disp{display:flex;justify-content:space-between;margin-top:4px;}
.sim-disp span{font-size:.68rem;color:var(--tx4);}
.sim-disp strong{font-size:.85rem;font-weight:700;color:var(--bl2);}

.sim-result{background:var(--s3);border-radius:10px;padding:15px;}
.sim-result-t{font-size:.68rem;text-transform:uppercase;letter-spacing:.7px;color:var(--tx4);font-weight:700;margin-bottom:12px;}
.sim-result-kg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.sr{background:var(--s1);border-radius:7px;padding:9px;}
.sr label{display:block;font-size:.58rem;text-transform:uppercase;letter-spacing:.4px;color:var(--tx4);margin-bottom:3px;}
.sr span{font-size:.9rem;font-weight:700;}
.sr.ok span{color:var(--gn2);}
.sr.wa span{color:var(--yw2);}
.sr.ba span{color:var(--rd2);}
.sr.in span{color:var(--bl2);}

.sim-gauge{text-align:center;padding:14px;background:var(--s1);border-radius:10px;margin-bottom:12px;}
.gauge-v{font-size:2.2rem;font-weight:800;line-height:1;margin-bottom:4px;}
.gauge-l{font-size:.68rem;color:var(--tx4);}
.gauge-chip{display:inline-block;padding:4px 14px;border-radius:99px;font-size:.72rem;font-weight:700;margin-top:7px;}

.bon-calc{background:var(--s1);border-radius:8px;padding:12px;margin-top:10px;}
.bon-calc-t{font-size:.64rem;text-transform:uppercase;letter-spacing:.5px;color:var(--yw2);font-weight:700;margin-bottom:9px;}
.bcr{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;margin-bottom:5px;padding:5px 7px;background:var(--s3);border-radius:5px;}
.bcr span{color:var(--tx3);}
.bcr strong{color:var(--yw2);}
.bcr.tot-row{margin-top:7px;padding-top:7px;border-top:1px solid var(--bd2);background:transparent;padding-left:0;
